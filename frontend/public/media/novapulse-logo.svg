<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Teal to green gradient for the main logo -->
    <linearGradient id="teалGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial gradient for glow effect -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filter for drop shadow -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Background circle with glow -->
  <circle cx="100" cy="100" r="95" fill="url(#glowGradient)" />

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#teалGradient)" stroke-width="2" opacity="0.3" />

  <!-- Main pulse wave container -->
  <g filter="url(#dropShadow)">
    
    <!-- Central pulse circle (represents "Nova" - new/bright star) -->
    <circle cx="100" cy="100" r="28" fill="url(#teалGradient)" opacity="0.9" />
    
    <!-- Inner core for depth -->
    <circle cx="100" cy="100" r="20" fill="#fff" opacity="0.2" />
    
    <!-- Pulse waves emanating outward (represents "Pulse" - heartbeat) -->
    
    <!-- First wave (closest) -->
    <path d="M 100 72 Q 110 70 115 75 Q 120 80 115 85 Q 110 90 100 88" 
          fill="none" stroke="url(#teалGradient)" stroke-width="2.5" 
          stroke-linecap="round" opacity="0.7" />
    
    <path d="M 100 128 Q 110 130 115 125 Q 120 120 115 115 Q 110 110 100 112" 
          fill="none" stroke="url(#teалGradient)" stroke-width="2.5" 
          stroke-linecap="round" opacity="0.7" />
    
    <!-- Second wave (medium distance) -->
    <path d="M 100 58 Q 125 52 135 65 Q 145 78 135 90 Q 125 100 100 102" 
          fill="none" stroke="url(#teалGradient)" stroke-width="2" 
          stroke-linecap="round" opacity="0.5" />
    
    <path d="M 100 142 Q 125 148 135 135 Q 145 122 135 110 Q 125 100 100 98" 
          fill="none" stroke="url(#teалGradient)" stroke-width="2" 
          stroke-linecap="round" opacity="0.5" />
    
    <!-- Third wave (outer) -->
    <path d="M 100 44 Q 140 35 155 55 Q 170 75 155 105 Q 140 120 100 116" 
          fill="none" stroke="url(#teалGradient)" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.3" />
    
    <path d="M 100 156 Q 140 165 155 145 Q 170 125 155 95 Q 140 80 100 84" 
          fill="none" stroke="url(#teалGradient)" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.3" />
    
    <!-- Left pulse waves -->
    <path d="M 100 72 Q 90 70 85 75 Q 80 80 85 85 Q 90 90 100 88" 
          fill="none" stroke="url(#teалGradient)" stroke-width="2.5" 
          stroke-linecap="round" opacity="0.7" />
    
    <path d="M 100 128 Q 90 130 85 125 Q 80 120 85 115 Q 90 110 100 112" 
          fill="none" stroke="url(#teалGradient)" stroke-width="2.5" 
          stroke-linecap="round" opacity="0.7" />
    
    <!-- Second wave (left) -->
    <path d="M 100 58 Q 75 52 65 65 Q 55 78 65 90 Q 75 100 100 102" 
          fill="none" stroke="url(#teалGradient)" stroke-width="2" 
          stroke-linecap="round" opacity="0.5" />
    
    <path d="M 100 142 Q 75 148 65 135 Q 55 122 65 110 Q 75 100 100 98" 
          fill="none" stroke="url(#teалGradient)" stroke-width="2" 
          stroke-linecap="round" opacity="0.5" />
    
    <!-- Third wave (left, outer) -->
    <path d="M 100 44 Q 60 35 45 55 Q 30 75 45 105 Q 60 120 100 116" 
          fill="none" stroke="url(#teалGradient)" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.3" />
    
    <path d="M 100 156 Q 60 165 45 145 Q 30 125 45 95 Q 60 80 100 84" 
          fill="none" stroke="url(#teалGradient)" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.3" />
    
  </g>

  <!-- Central uptrend indicator (stylized chart line going up) -->
  <g opacity="0.8">
    <path d="M 88 108 L 96 102 L 104 105 L 112 95" 
          fill="none" stroke="#fff" stroke-width="2" 
          stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Small accent dots (representing data points) -->
  <circle cx="88" cy="108" r="1.5" fill="#fff" opacity="0.8" />
  <circle cx="96" cy="102" r="1.5" fill="#fff" opacity="0.8" />
  <circle cx="104" cy="105" r="1.5" fill="#fff" opacity="0.8" />
  <circle cx="112" cy="95" r="1.5" fill="#fff" opacity="0.8" />

  <!-- Outer decorative ring for premium feel -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#teалGradient)" stroke-width="1" opacity="0.5" stroke-dasharray="3,2" />

</svg>
