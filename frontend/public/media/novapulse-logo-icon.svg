<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Teal gradient -->
    <linearGradient id="gradientIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial glow -->
    <radialGradient id="glowIcon">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background glow circle -->
  <circle cx="100" cy="100" r="100" fill="url(#glowIcon)" opacity="0.5"/>

  <!-- Main container circle -->
  <circle cx="100" cy="100" r="85" fill="#ffffff" stroke="url(#gradientIcon)" stroke-width="2"/>

  <!-- Inner accent ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#gradientIcon)" stroke-width="1" opacity="0.2"/>

  <!-- Upward trending arrow (Nova = new/rising) -->
  <g transform="translate(100, 100)">
    
    <!-- Main pulse line going upward (represents growth and market pulse) -->
    <!-- Baseline -->
    <line x1="-35" y1="20" x2="35" y2="20" 
          stroke="url(#gradientIcon)" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    
    <!-- Pulse wave line -->
    <path d="M -30 20 L -20 15 L -10 18 L 0 8 L 10 18 L 20 14 L 30 20" 
          fill="none" stroke="url(#gradientIcon)" stroke-width="3.5" 
          stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Arrow head pointing up -->
    <path d="M -2 -15 L 0 -25 L 2 -15" 
          fill="url(#gradientIcon)" stroke="url(#gradientIcon)" stroke-width="1.5" 
          stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Arrow shaft -->
    <line x1="0" y1="-10" x2="0" y2="5" 
          stroke="url(#gradientIcon)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Data point markers on pulse -->
    <circle cx="-20" cy="15" r="2" fill="url(#gradientIcon)" opacity="0.8"/>
    <circle cx="-10" cy="18" r="2" fill="url(#gradientIcon)" opacity="0.8"/>
    <circle cx="0" cy="8" r="2.5" fill="url(#gradientIcon)" opacity="0.9"/>
    <circle cx="10" cy="18" r="2" fill="url(#gradientIcon)" opacity="0.8"/>
    <circle cx="20" cy="14" r="2" fill="url(#gradientIcon)" opacity="0.8"/>
    
  </g>

  <!-- Bottom decorative element - three stacked dots (representing layers/data) -->
  <g transform="translate(100, 155)">
    <circle cx="0" cy="0" r="2.5" fill="url(#gradientIcon)" opacity="0.7"/>
    <circle cx="-8" cy="0" r="2" fill="url(#gradientIcon)" opacity="0.5"/>
    <circle cx="8" cy="0" r="2" fill="url(#gradientIcon)" opacity="0.5"/>
  </g>

</svg>
